<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consejos de cuidado | [Nombre de tu marca]</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.7; max-width: 900px; margin: 40px auto; padding: 0 20px; background: #f9f9f9; color: #333; }
        h1, h2 { color: #222; }
        .tip { background: #e8f5e9; padding: 18px; border-left: 5px solid #4caf50; margin: 20px 0; border-radius: 4px; }
    </style>
</head>
<body>

    <h1>Consejos prácticos para cuidar tu piel</h1>

    <div class="tip">
        <h2>1. Aplicá la crema con la piel húmeda</h2>
        <p>Después de la ducha o de lavarte la cara, dejá la piel ligeramente húmeda. Así la crema penetra mucho mejor.</p>
    </div>

    <div class="tip">
        <h2>2. No te olvides del cuello y escote</h2>
        <p>Son zonas que envejecen rápido y casi nadie las hidrata.</p>
    </div>

    <!-- Agrega más tips con la misma clase .tip -->

</body>
</html>
